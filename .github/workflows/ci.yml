name: CI — test on push to dev

on:
  push:
    branches:
      - dev

jobs:
  # ── AI Backend (Python) ──────────────────────────────────────────
  backend-tests:
    name: Backend · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai

    env:
      AUTH_SECRET: ci-dummy-secret
      ENVIRONMENT: test
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install litellm from GitHub (PyPI quarantined)
        run: pip install git+https://github.com/BerriAI/litellm.git

      - name: Install dependencies
        run: pip install -e .

      - name: Run tests
        run: pytest tests/ -v

  # ── Frontend (Next.js) ──────────────────────────────────────────
  frontend-checks:
    name: Frontend · test + typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
